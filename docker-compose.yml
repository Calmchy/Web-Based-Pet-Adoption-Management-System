services:

  # ── PHP + Apache ──────────────────────────────────────────
  php:
    build: ./php
    container_name: php_app
    ports:
      - "6060:80"
    volumes:
      - ./www:/var/www/html
    depends_on:
      - mariadb
    networks:
      - app-network
    restart: unless-stopped

  # ── MariaDB ───────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: mariadb
    environment:
      MYSQL_ROOT_PASSWORD: canwepass
      MYSQL_DATABASE: adoptme
      MYSQL_USER: adoptme
      MYSQL_PASSWORD: idontknow
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped

  # ── phpMyAdmin ────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "6061:80"
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: canwepass
    depends_on:
      - mariadb
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mariadb_data:
